<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Касса Музея</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #0a0a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 16px; }
        .container { max-width: 500px; width: 100%; background: white; border-radius: 32px; padding: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        h1 { font-size: 22px; text-align: center; margin-bottom: 8px; color: #1a1a2e; }
        .sub { text-align: center; color: #666; font-size: 14px; margin-bottom: 20px; }
        #scanner-box { width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 20px; overflow: hidden; position: relative; display: none; }
        #scanner-box video { width: 100%; height: 100%; object-fit: cover; }
        #status {
            margin-top: 16px;
            padding: 14px;
            border-radius: 12px;
            background: #f0f0f0;
            text-align: center;
            font-size: 16px;
            min-height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-word;
            transition: 0.3s;
        }
        #status.success { background: #e8f5e9; color: #1b5e20; }
        #status.error { background: #ffebee; color: #b71c1c; }
        #status.info { background: #e3f2fd; color: #0d47a1; }
        #status.warning { background: #fff3e0; color: #e65100; }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin-top: 12px;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: bold;
            background: #2196F3;
            color: white;
            cursor: pointer;
        }
        .btn:active { transform: scale(0.97); }
        .btn-success { background: #4CAF50; }
        .btn-secondary { background: #e0e0e0; color: #333; }
        .btn-danger { background: #f44336; }
        #stats { margin-top: 16px; padding-top: 16px; border-top: 2px dashed #ddd; display: none; }
        .stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f5f5f5; }
        .stat-row .count { font-weight: bold; background: #e3f2fd; padding: 0 14px; border-radius: 30px; }
        .total { text-align: center; font-weight: bold; margin-top: 12px; font-size: 18px; }
        #discountInfo { margin-top: 8px; font-size: 18px; font-weight: bold; color: #2e7d32; display: none; }
    </style>
</head>
<body>
<div class="container">
    <h1>📷 Касса Музея</h1>
    <p class="sub">Наведите камеру на QR-код клиента</p>

    <button class="btn btn-success" id="btnStartScanner">▶ Запустить сканер</button>
    <div id="scanner-box"></div>

    <div id="status">Нажмите «Запустить сканер», чтобы начать</div>
    <div id="discountInfo"></div>

    <button class="btn" id="btnStats">📊 Показать статистику</button>

    <div id="stats">
        <h3 style="text-align:center;">Статистика за всё время</h3>
        <div id="statsList"></div>
        <div class="total" id="totalCount">Всего: 0</div>
        <button class="btn btn-secondary" id="btnHideStats">Скрыть статистику</button>
    </div>
</div>

<script>
    // ------------------------------------------------------------
    // Firebase Config (ваши данные)
    // ------------------------------------------------------------
    const firebaseConfig = {
        apiKey: "AIzaSyB_NnphXG-1lyGyatz4wTU1rnk9XbnGHEo",
        authDomain: "retromuseumstats.firebaseapp.com",
        projectId: "retromuseumstats",
        storageBucket: "retromuseumstats.firebasestorage.app",
        messagingSenderId: "1098839930754",
        appId: "1:1098839930754:web:743e2c49a1d953d696819b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ------------------------------------------------------------
    // Элементы
    // ------------------------------------------------------------
    const statusDiv = document.getElementById('status');
    const discountInfo = document.getElementById('discountInfo');
    const scannerBox = document.getElementById('scanner-box');
    const btnStart = document.getElementById('btnStartScanner');
    const btnStats = document.getElementById('btnStats');
    const btnHideStats = document.getElementById('btnHideStats');
    const statsBlock = document.getElementById('stats');
    const statsList = document.getElementById('statsList');
    const totalCount = document.getElementById('totalCount');

    let html5QrCode = null;
    let isScanning = false;

    // ------------------------------------------------------------
    // Сканер
    // ------------------------------------------------------------
    function startScanner() {
        if (isScanning) return;
        if (!html5QrCode) {
            html5QrCode = new Html5Qrcode("scanner-box");
        }

        scannerBox.style.display = 'block';
        btnStart.textContent = '⏳ Запуск...';
        btnStart.disabled = true;
        statusDiv.className = 'status info';
        statusDiv.textContent = 'Запрос доступа к камере...';

        const config = {
            fps: 10,
            qrbox: { width: 250, height: 250 },
            aspectRatio: 1.0
        };

        html5QrCode.start(
            { facingMode: "environment" },
            config,
            onScanSuccess,
            (error) => {}
        ).then(() => {
            isScanning = true;
            btnStart.textContent = '🔄 Остановить сканер';
            btnStart.disabled = false;
            statusDiv.className = 'status info';
            statusDiv.textContent = 'Сканер активен. Наведите на QR-код.';
        }).catch((err) => {
            btnStart.textContent = '▶ Запустить сканер';
            btnStart.disabled = false;
            scannerBox.style.display = 'none';
            isScanning = false;
            statusDiv.className = 'status error';
            if (err === 'Camera access denied.') {
                statusDiv.textContent = '❌ Доступ к камере запрещён. Разрешите в настройках браузера.';
            } else {
                statusDiv.textContent = `❌ Ошибка: ${err}`;
            }
            html5QrCode = null;
        });
    }

    function stopScanner() {
        if (html5QrCode && isScanning) {
            html5QrCode.stop().then(() => {
                isScanning = false;
                scannerBox.style.display = 'none';
                btnStart.textContent = '▶ Запустить сканер';
                btnStart.disabled = false;
                statusDiv.className = 'status';
                statusDiv.textContent = 'Сканер остановлен.';
                html5QrCode = null;
            }).catch(() => {});
        }
    }

    btnStart.addEventListener('click', function() {
        if (isScanning) {
            stopScanner();
        } else {
            startScanner();
        }
    });

    // Обработка сканирования
    function onScanSuccess(decodedText) {
        if (html5QrCode) {
            html5QrCode.stop().then(() => {
                isScanning = false;
                scannerBox.style.display = 'none';
                btnStart.textContent = '▶ Запустить сканер';
                btnStart.disabled = false;
                statusDiv.className = 'status';
                statusDiv.textContent = 'QR считан, обрабатываю...';
                handleScannedData(decodedText);
            }).catch(() => {
                handleScannedData(decodedText);
            });
        } else {
            handleScannedData(decodedText);
        }
    }

    function handleScannedData(decodedText) {
        try {
            const url = new URL(decodedText);
            const ref = url.searchParams.get('ref');
            if (!ref || ref.trim() === '') {
                statusDiv.className = 'status error';
                statusDiv.textContent = '❌ Нет параметра "ref" в QR';
                return;
            }
            // Проверяем, существует ли такой источник в коллекции sources
            db.collection('sources').where('ref', '==', ref).get()
                .then(snapshot => {
                    let discountText = '';
                    let sourceExists = false;
                    let docId = null;
                    snapshot.forEach(doc => {
                        sourceExists = true;
                        const data = doc.data();
                        if (data.discount) discountText = data.discount;
                        docId = doc.id;
                    });
                    if (!sourceExists) {
                        statusDiv.className = 'status warning';
                        statusDiv.textContent = `⚠️ Источник "${ref}" не зарегистрирован в админке. Запись всё равно будет создана.`;
                        discountInfo.style.display = 'none';
                    } else {
                        statusDiv.className = 'status success';
                        statusDiv.textContent = `✅ Распознано: "${ref}"`;
                        if (discountText) {
                            discountInfo.style.display = 'block';
                            discountInfo.textContent = `🎁 Скидка: ${discountText}`;
                        } else {
                            discountInfo.style.display = 'none';
                        }
                    }
                    // Записываем покупку
                    return db.collection("purchases").add({
                        source: ref,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                        admin: "Касса (сканер)"
                    });
                })
                .then(() => {
                    if (statusDiv.className !== 'status warning') {
                        statusDiv.className = 'status success';
                        statusDiv.textContent = `✅ Продажа записана! Источник: ${ref}`;
                    } else {
                        statusDiv.textContent = `⚠️ Продажа записана для "${ref}" (незарегистрированный источник)`;
                    }
                    loadStats();
                    setTimeout(() => {
                        // Не перезапускаем автоматически, ждём кнопку
                    }, 3000);
                })
                .catch(err => {
                    statusDiv.className = 'status error';
                    statusDiv.textContent = `❌ Ошибка: ${err.message}`;
                });
        } catch (e) {
            statusDiv.className = 'status error';
            statusDiv.textContent = '❌ Ошибка чтения ссылки';
        }
    }

    // ------------------------------------------------------------
    // Статистика (такая же, как в админке, но проще - за всё время)
    // ------------------------------------------------------------
    function loadStats() {
        db.collection("purchases").get().then((snapshot) => {
            const map = {};
            let total = 0;
            snapshot.forEach(doc => {
                const source = doc.data().source || 'unknown';
                map[source] = (map[source] || 0) + 1;
                total++;
            });
            let html = '';
            const sorted = Object.entries(map).sort((a,b) => b[1] - a[1]);
            if (sorted.length === 0) {
                html = '<div style="text-align:center;color:#999;">Нет данных</div>';
            } else {
                for (let [key, count] of sorted) {
                    html += `<div class="stat-row"><span>${key}</span><span class="count">${count}</span></div>`;
                }
            }
            statsList.innerHTML = html;
            totalCount.textContent = `Всего: ${total}`;
        }).catch(err => {
            statsList.innerHTML = `<div style="color:red;">Ошибка: ${err.message}</div>`;
        });
    }

    btnStats.addEventListener('click', () => {
        statsBlock.style.display = 'block';
        loadStats();
    });
    btnHideStats.addEventListener('click', () => {
        statsBlock.style.display = 'none';
    });

    // Загружаем статистику при первом открытии (скрыто)
    loadStats();
</script>
</body>
</html>
