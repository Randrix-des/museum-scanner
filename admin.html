<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админка Музея</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 24px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { margin-top: 0; }
        .login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .login-screen input, .login-screen button { padding: 14px; font-size: 18px; border-radius: 12px; border: 1px solid #ccc; width: 100%; max-width: 300px; margin-bottom: 12px; }
        .login-screen button { background: #4CAF50; color: white; border: none; cursor: pointer; }
        .hidden { display: none; }
        .tabs { display: flex; gap: 12px; margin: 20px 0; border-bottom: 2px solid #eee; padding-bottom: 12px; flex-wrap: wrap; }
        .tabs button { padding: 10px 20px; border: none; background: none; font-size: 16px; cursor: pointer; border-radius: 20px; }
        .tabs button.active { background: #2196F3; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 14px; }
        th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid #ddd; vertical-align: middle; }
        th { background: #f5f5f5; }
        .actions button { margin-right: 4px; padding: 4px 10px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .btn-edit { background: #ffc107; color: #333; }
        .btn-delete { background: #f44336; color: white; }
        .btn-toggle { background: #9e9e9e; color: white; }
        .btn-toggle.active { background: #4CAF50; }
        .btn-copy { background: #e0e0e0; color: #333; padding: 2px 12px; border-radius: 12px; font-size: 12px; cursor: pointer; border: none; }
        .form-add { background: #f9f9f9; padding: 16px; border-radius: 12px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 12px; align-items: end; }
        .form-add input, .form-add button { padding: 10px; border-radius: 8px; border: 1px solid #ccc; flex: 1; min-width: 150px; }
        .form-add button { background: #2196F3; color: white; border: none; cursor: pointer; }
        .stats-period { display: flex; gap: 10px; margin: 16px 0; flex-wrap: wrap; align-items: center; }
        .stats-period button { padding: 8px 20px; border: 1px solid #ccc; background: white; border-radius: 20px; cursor: pointer; }
        .stats-period button.active { background: #2196F3; color: white; border-color: #2196F3; }
        .stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
        .stat-row .count { font-weight: bold; background: #e3f2fd; padding: 0 14px; border-radius: 30px; }
        .total-stat { font-size: 20px; font-weight: bold; margin-top: 16px; text-align: center; }
        .error { color: #f44336; }
        .success { color: #4CAF50; }
        .message { padding: 12px; margin: 10px 0; border-radius: 8px; }
        .export-btn { background: #4CAF50; color: white; border: none; padding: 10px 24px; border-radius: 20px; cursor: pointer; font-size: 16px; margin-left: auto; }
        .qr-link { display: flex; align-items: center; gap: 6px; }
        .qr-link input { border: none; background: #f5f5f5; padding: 4px 8px; border-radius: 4px; font-size: 12px; width: 180px; }
        .qr-link button { padding: 2px 10px; }
        .stats-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .stats-header .left { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
        @media (max-width: 600px) {
            .qr-link input { width: 120px; }
            table { font-size: 12px; }
            th, td { padding: 6px; }
        }
    </style>
</head>
<body>
<div id="app">
    <!-- Экран входа -->
    <div id="loginScreen" class="login-screen">
        <h2>🔐 Админ-панель</h2>
        <input type="password" id="passwordInput" placeholder="Введите пароль">
        <button id="loginBtn">Войти</button>
        <div id="loginError" class="error" style="display:none;">Неверный пароль</div>
    </div>

    <!-- Основной интерфейс -->
    <div id="mainContent" class="container hidden">
        <h1>🏛️ Музей Ретро-Приставок — Админка</h1>
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
            <div class="tabs">
                <button class="tab-btn active" data-tab="sources">📋 Источники</button>
                <button class="tab-btn" data-tab="stats">📊 Статистика</button>
            </div>
            <button id="logoutBtn" style="background:#f44336; color:white; border:none; padding:8px 16px; border-radius:8px; cursor:pointer;">Выйти</button>
        </div>

        <!-- Вкладка "Источники" -->
        <div id="tabSources" class="tab-content active">
            <h2>Управление реф-кодами</h2>
            <div class="form-add">
                <input type="text" id="newRef" placeholder="ref (например, bus)" required>
                <input type="text" id="newDiscount" placeholder="Скидка (10%, 200 руб)">
                <input type="text" id="newDesc" placeholder="Описание (Автобусная реклама)">
                <button id="addBtn">➕ Добавить</button>
            </div>
            <div id="message" class="message" style="display:none;"></div>
            <table>
                <thead>
                    <tr><th>Ref</th><th>Скидка</th><th>Описание</th><th>Ссылка для QR</th><th>Статус</th><th>Действия</th></tr>
                </thead>
                <tbody id="sourcesTableBody"></tbody>
            </table>
        </div>

        <!-- Вкладка "Статистика" -->
        <div id="tabStats" class="tab-content">
            <div class="stats-header">
                <div class="left">
                    <h2 style="margin:0;">Статистика продаж</h2>
                    <div class="stats-period">
                        <button class="period-btn active" data-period="day">День</button>
                        <button class="period-btn" data-period="week">Неделя</button>
                        <button class="period-btn" data-period="month">Месяц</button>
                        <button class="period-btn" data-period="all">Всё время</button>
                    </div>
                </div>
                <button id="exportCSVBtn" class="export-btn">📥 Экспорт CSV</button>
            </div>
            <div id="statsContainer">
                <div id="statsList"></div>
                <div class="total-stat" id="totalStat">Всего: 0</div>
            </div>
        </div>
    </div>
</div>

<script>
    // ------------------------------------------------------------
    // Firebase Config
    // ------------------------------------------------------------
    const firebaseConfig = {
        apiKey: "AIzaSyB_NnphXG-1lyGyatz4wTU1rnk9XbnGHEo",
        authDomain: "retromuseumstats.firebaseapp.com",
        projectId: "retromuseumstats",
        storageBucket: "retromuseumstats.firebasestorage.app",
        messagingSenderId: "1098839930754",
        appId: "1:1098839930754:web:743e2c49a1d953d696819b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ------------------------------------------------------------
    // Пароль
    // ------------------------------------------------------------
    const ADMIN_PASSWORD = 'admin123';

    // ------------------------------------------------------------
    // DOM элементы
    // ------------------------------------------------------------
    const loginScreen = document.getElementById('loginScreen');
    const mainContent = document.getElementById('mainContent');
    const passwordInput = document.getElementById('passwordInput');
    const loginBtn = document.getElementById('loginBtn');
    const loginError = document.getElementById('loginError');
    const logoutBtn = document.getElementById('logoutBtn');

    const sourcesTableBody = document.getElementById('sourcesTableBody');
    const messageDiv = document.getElementById('message');
    const addBtn = document.getElementById('addBtn');
    const newRef = document.getElementById('newRef');
    const newDiscount = document.getElementById('newDiscount');
    const newDesc = document.getElementById('newDesc');

    const tabBtns = document.querySelectorAll('.tab-btn');
    const tabSources = document.getElementById('tabSources');
    const tabStats = document.getElementById('tabStats');

    const periodBtns = document.querySelectorAll('.period-btn');
    const statsList = document.getElementById('statsList');
    const totalStat = document.getElementById('totalStat');
    const exportBtn = document.getElementById('exportCSVBtn');

    let currentPeriod = 'day';
    let currentStatsData = []; // для CSV

    // ------------------------------------------------------------
    // Авторизация
    // ------------------------------------------------------------
    function login() {
        const pass = passwordInput.value;
        if (pass === ADMIN_PASSWORD) {
            loginScreen.style.display = 'none';
            mainContent.classList.remove('hidden');
            loginError.style.display = 'none';
            loadSources();
        } else {
            loginError.style.display = 'block';
        }
    }
    loginBtn.addEventListener('click', login);
    passwordInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') login(); });

    logoutBtn.addEventListener('click', () => {
        mainContent.classList.add('hidden');
        loginScreen.style.display = 'flex';
        passwordInput.value = '';
        loginError.style.display = 'none';
    });

    // Переключение вкладок
    tabBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            tabBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            if (btn.dataset.tab === 'sources') {
                tabSources.classList.add('active');
                loadSources();
            } else if (btn.dataset.tab === 'stats') {
                tabStats.classList.add('active');
                loadStatistics(currentPeriod);
            }
        });
    });

    // Переключение периода статистики
    periodBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            periodBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentPeriod = btn.dataset.period;
            loadStatistics(currentPeriod);
        });
    });

    // ------------------------------------------------------------
    // Функции для работы с источниками (CRUD)
    // ------------------------------------------------------------
    function showMessage(text, isError = false) {
        messageDiv.textContent = text;
        messageDiv.className = 'message ' + (isError ? 'error' : 'success');
        messageDiv.style.display = 'block';
        setTimeout(() => { messageDiv.style.display = 'none'; }, 3000);
    }

    // Функция для генерации ссылки на сайт
    function generateQRLink(ref) {
        return `https://музейприставок.рф/?ref=${encodeURIComponent(ref)}`;
    }

    function loadSources() {
        db.collection('sources').orderBy('createdAt', 'desc').get().then(snapshot => {
            let html = '';
            snapshot.forEach(doc => {
                const data = doc.data();
                const ref = data.ref;
                const discount = data.discount || '';
                const desc = data.description || '';
                const active = data.active !== undefined ? data.active : true;
                const link = generateQRLink(ref);
                html += `<tr>
                    <td><strong>${ref}</strong></td>
                    <td>${discount}</td>
                    <td>${desc}</td>
                    <td>
                        <div class="qr-link">
                            <input type="text" value="${link}" readonly id="link_${doc.id}" onclick="this.select()">
                            <button class="btn-copy" onclick="copyLink('link_${doc.id}')">📋</button>
                        </div>
                    </td>
                    <td>${active ? '✅ Активен' : '⛔ Неактивен'}</td>
                    <td class="actions">
                        <button class="btn-toggle ${active ? 'active' : ''}" onclick="toggleSource('${doc.id}', ${!active})">${active ? 'Отключить' : 'Включить'}</button>
                        <button class="btn-edit" onclick="editSource('${doc.id}', '${ref}', '${discount}', '${desc}')">✏️</button>
                        <button class="btn-delete" onclick="deleteSource('${doc.id}')">🗑️</button>
                    </td>
                </tr>`;
            });
            sourcesTableBody.innerHTML = html || '<tr><td colspan="6">Нет источников. Добавьте первый!</td></tr>';
        }).catch(err => showMessage('Ошибка загрузки: ' + err.message, true));
    }

    window.copyLink = function(inputId) {
        const input = document.getElementById(inputId);
        input.select();
        document.execCommand('copy');
        showMessage('Ссылка скопирована!');
    };

    function addSource() {
        const ref = newRef.value.trim();
        const discount = newDiscount.value.trim();
        const desc = newDesc.value.trim();
        if (!ref) { showMessage('Введите ref', true); return; }
        db.collection('sources').where('ref', '==', ref).get().then(snapshot => {
            if (!snapshot.empty) {
                showMessage('Такой ref уже существует!', true);
                return;
            }
            return db.collection('sources').add({
                ref: ref,
                discount: discount,
                description: desc,
                active: true,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
        }).then(() => {
            showMessage('Источник добавлен');
            newRef.value = '';
            newDiscount.value = '';
            newDesc.value = '';
            loadSources();
        }).catch(err => showMessage('Ошибка: ' + err.message, true));
    }
    addBtn.addEventListener('click', addSource);

    window.toggleSource = function(docId, newActive) {
        db.collection('sources').doc(docId).update({ active: newActive })
            .then(() => { showMessage('Статус обновлён'); loadSources(); })
            .catch(err => showMessage('Ошибка: ' + err.message, true));
    };

    window.deleteSource = function(docId) {
        if (!confirm('Удалить этот источник?')) return;
        db.collection('sources').doc(docId).delete()
            .then(() => { showMessage('Удалено'); loadSources(); })
            .catch(err => showMessage('Ошибка: ' + err.message, true));
    };

    window.editSource = function(docId, oldRef, oldDiscount, oldDesc) {
        const newRef = prompt('Введите новый ref:', oldRef);
        if (newRef === null) return;
        const newDiscount = prompt('Введите скидку:', oldDiscount) || '';
        const newDesc = prompt('Введите описание:', oldDesc) || '';
        if (!newRef.trim()) { showMessage('Ref не может быть пустым', true); return; }
        db.collection('sources').doc(docId).update({
            ref: newRef.trim(),
            discount: newDiscount,
            description: newDesc
        }).then(() => { showMessage('Обновлено'); loadSources(); })
          .catch(err => showMessage('Ошибка: ' + err.message, true));
    };

    // ------------------------------------------------------------
    // Статистика
    // ------------------------------------------------------------
    function loadStatistics(period) {
        const now = new Date();
        let startDate;
        switch(period) {
            case 'day':
                startDate = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                break;
            case 'week':
                const day = now.getDay() || 7;
                startDate = new Date(now.getFullYear(), now.getMonth(), now.getDate() - day + 1);
                break;
            case 'month':
                startDate = new Date(now.getFullYear(), now.getMonth(), 1);
                break;
            case 'all':
            default:
                startDate = new Date(0);
                break;
        }
        const startTimestamp = firebase.firestore.Timestamp.fromDate(startDate);

        db.collection('purchases')
            .where('timestamp', '>=', startTimestamp)
            .get()
            .then(snapshot => {
                const stats = {};
                let total = 0;
                const rawData = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const source = data.source || 'unknown';
                    const ts = data.timestamp ? data.timestamp.toDate() : null;
                    stats[source] = (stats[source] || 0) + 1;
                    total++;
                    rawData.push({ source, timestamp: ts });
                });
                currentStatsData = rawData; // сохраняем для CSV

                let html = '';
                const sorted = Object.entries(stats).sort((a,b) => b[1] - a[1]);
                if (sorted.length === 0) {
                    html = '<div style="text-align:center;color:#999;">Нет продаж за выбранный период</div>';
                } else {
                    for (let [key, count] of sorted) {
                        html += `<div class="stat-row"><span>${key}</span><span class="count">${count}</span></div>`;
                    }
                }
                statsList.innerHTML = html;
                totalStat.textContent = `Всего продаж: ${total}`;
            })
            .catch(err => {
                statsList.innerHTML = `<div class="error">Ошибка загрузки статистики: ${err.message}</div>`;
                totalStat.textContent = '';
                currentStatsData = [];
            });
    }

    // ------------------------------------------------------------
    // Экспорт CSV
    // ------------------------------------------------------------
    function exportCSV() {
        if (currentStatsData.length === 0) {
            alert('Нет данных для экспорта за выбранный период.');
            return;
        }
        // Формируем CSV
        let csv = 'Источник,Дата и время\n';
        currentStatsData.forEach(item => {
            const dateStr = item.timestamp ? item.timestamp.toLocaleString('ru-RU') : '—';
            csv += `${item.source},${dateStr}\n`;
        });
        // Скачиваем
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.setAttribute('href', url);
        link.setAttribute('download', `statistics_${currentPeriod}_${new Date().toISOString().slice(0,10)}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    }

    exportBtn.addEventListener('click', exportCSV);

    // Загружаем статистику при открытии вкладки
    // уже реализовано в обработчике вкладок
</script>
</body>
</html>
